<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trading Bot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1117; color: #e8e8e8; padding: 12px; font-size: 14px; }
h2 { font-size: 11px; font-weight: 500; color: #555; margin: 18px 0 8px; text-transform: uppercase; letter-spacing: .08em; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.header h1 { font-size: 18px; font-weight: 600; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.card { background: #1a1d27; border-radius: 10px; padding: 12px; }
.card .lbl { font-size: 11px; color: #666; margin-bottom: 4px; }
.card .val { font-size: 22px; font-weight: 600; }
.up { color: #1D9E75; } .down { color: #D85A30; }
.chart-card { background: #1a1d27; border-radius: 10px; padding: 14px; margin-top: 8px; }
.chart-wrap { position: relative; width: 100%; height: 160px; }
.bots { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.bot { background: #1a1d27; border-radius: 10px; padding: 12px; }
.bot-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bot-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.bot-name { font-size: 11px; font-weight: 500; }
.bar-bg { height: 5px; border-radius: 3px; background: #2a2d3a; margin-bottom: 6px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .7s ease; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.badge-buy  { background: #0F6E5622; color: #1D9E75; }
.badge-sell { background: #D85A3022; color: #D85A30; }
.badge-hold { background: #44444422; color: #888; }
.consensus { background: #1a1d27; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.votes { display: flex; gap: 5px; }
.vote { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
.v-buy  { background: #0F6E5622; color: #1D9E75; }
.v-sell { background: #D85A3022; color: #D85A30; }
.v-hold { background: #2a2d3a; color: #888; }
.verdict { font-size: 12px; font-weight: 500; }
.tickers { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.tchip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; background: #1a1d27; color: #888; cursor: pointer; border: 1px solid transparent; }
.tchip.active { color: #4a9eff; border-color: #4a9eff33; background: #4a9eff11; }
.stop-target { font-size: 10px; color: #555; margin-top: 2px; }
.trades { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
.trade { display: flex; align-items: center; gap: 8px; background: #1a1d27; border-radius: 8px; padding: 10px 12px; font-size: 12px; flex-wrap: wrap; }
.trade-type { font-weight: 600; min-width: 36px; }
.trade-pnl { font-weight: 600; }
.status-bar { font-size: 11px; color: #444; text-align: center; margin-top: 16px; padding-bottom: 8px; }
.market-closed { color: #555; font-size: 13px; padding: 16px; text-align: center; grid-column: span 2; }
</style>
</head>
<body>

<div class="header">
  <h1>Trading Bot</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="/scanner" style="font-size:12px;color:#4a9eff;text-decoration:none;background:#4a9eff11;padding:5px 10px;border-radius:8px;">Scanner</a>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="dot" id="dot"></div>
      <span id="statusTxt" style="font-size:12px;color:#555;">Connecting...</span>
    </div>
  </div>
</div>

<div class="cards">
  <div class="card"><div class="lbl">Portfolio</div><div class="val" id="port">—</div></div>
  <div class="card"><div class="lbl">Cash</div><div class="val" id="cash">—</div></div>
  <div class="card"><div class="lbl">Total P&L</div><div class="val" id="pnl">—</div></div>
  <div class="card"><div class="lbl">Market regime</div><div class="val" id="regime" style="font-size:13px;">—</div></div>
</div>

<div class="chart-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:11px;color:#555;text-transform:uppercase;">Portfolio — 3 day</span>
    <span style="font-size:10px;color:#333;cursor:pointer;" onclick="clearChart()">Clear</span>
  </div>
  <div class="chart-wrap"><canvas id="portChart"></canvas></div>
</div>

<h2>Watching</h2>
<div class="tickers" id="tickers"></div>

<div class="consensus">
  <div style="font-size:12px;color:#555;">Bot consensus</div>
  <div class="votes" id="votes"></div>
  <div class="verdict" id="verdict">Waiting...</div>
</div>

<h2>Algorithms</h2>
<div class="bots" id="bots"><div class="market-closed">Waiting for market data...</div></div>

<h2>Trade log</h2>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
  <span id="tradeCount" style="font-size:11px;color:#555;"></span>
  <span style="font-size:10px;color:#333;cursor:pointer;" onclick="clearTrades()">Clear history</span>
</div>
<div class="trades" id="trades"><div style="color:#555;font-size:12px;padding:8px 0;">No trades yet</div></div>

<div class="status-bar" id="lastUpdate">Not yet connected</div>

<script>
const COLORS    = ['#4a9eff','#1D9E75','#E9A84C','#C45C8A','#7B68EE','#FF6B6B'];
const BOT_NAMES = ['MA','RSI','BB','VWAP','MACD','MR'];
const DEFAULT_TICKERS = ['AAPL','TSLA','NVDA','MSFT'];
const CHART_KEY  = 'portHistory_v3';
const TRADES_KEY = 'allTrades_v2';
const THREE_DAYS = 3 * 24 * 60 * 60 * 1000;

let activeTicker = null;
let lastState    = null;
let portChart;

// ── Persistent storage ────────────────────────────────────────

function loadPortHistory() {
  try {
    const saved = localStorage.getItem(CHART_KEY);
    if (!saved) return [];
    const cutoff = Date.now() - THREE_DAYS;
    return JSON.parse(saved).filter(d => d.ts > cutoff);
  } catch(e) { return []; }
}

function savePortHistory() {
  try { localStorage.setItem(CHART_KEY, JSON.stringify(portHistory)); } catch(e) {}
}

function loadAllTrades() {
  try {
    const saved = localStorage.getItem(TRADES_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch(e) { return []; }
}

function saveAllTrades() {
  try { localStorage.setItem(TRADES_KEY, JSON.stringify(allTrades.slice(0, 500))); } catch(e) {}
}

function clearChart() {
  localStorage.removeItem(CHART_KEY);
  portHistory = [];
  portChart.data.labels = [];
  portChart.data.datasets[0].data = [];
  portChart.update('none');
}

function clearTrades() {
  if (!confirm('Clear all trade history?')) return;
  localStorage.removeItem(TRADES_KEY);
  allTrades = [];
  renderTrades([]);
}

let portHistory = loadPortHistory();
let allTrades   = loadAllTrades();

// ── Chart ─────────────────────────────────────────────────────

function makeChartLabels() {
  return portHistory.map(d => {
    const dt = new Date(d.ts);
    return dt.toLocaleDateString([], {month:'numeric', day:'numeric'}) + ' ' +
           dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  });
}

function initChart() {
  const vals = portHistory.map(d => d.val);
  portChart = new Chart(document.getElementById('portChart'), {
    type: 'line',
    data: {
      labels: makeChartLabels(),
      datasets: [{
        data: vals,
        borderColor: '#1D9E75',
        borderWidth: 2,
        fill: true,
        backgroundColor: 'rgba(29,158,117,0.08)',
        pointRadius: 0,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          ticks: { color: '#555', font: { size: 11 }, callback: v => '$' + v.toLocaleString() },
          grid: { color: '#1e2130' }
        },
        x: {
          ticks: { color: '#444', font: { size: 9 }, maxTicksLimit: 6 },
          grid: { display: false }
        }
      }
    }
  });
}

function updateChart(val) {
  if (!val) return;
  portHistory.push({ ts: Date.now(), val });
  const cutoff = Date.now() - THREE_DAYS;
  portHistory = portHistory.filter(d => d.ts > cutoff);
  savePortHistory();
  const vals = portHistory.map(d => d.val);
  portChart.data.labels = makeChartLabels();
  portChart.data.datasets[0].data = vals;
  const first = vals[0];
  const up = val >= first;
  portChart.data.datasets[0].borderColor = up ? '#1D9E75' : '#D85A30';
  portChart.data.datasets[0].backgroundColor = up
    ? 'rgba(29,158,117,0.08)' : 'rgba(216,90,48,0.08)';
  portChart.update('none');
}

// ── Socket ────────────────────────────────────────────────────

const socket = io();

socket.on('connect', () => {
  document.getElementById('dot').style.background = '#1D9E75';
  document.getElementById('statusTxt').textContent = 'Live';
});
socket.on('disconnect', () => {
  document.getElementById('dot').style.background = '#D85A30';
  document.getElementById('statusTxt').textContent = 'Disconnected';
});

socket.on('state', (data) => {
  lastState = data;

  // Normalize tickers to object format
  let tickerMap = {};
  if (data.tickers && typeof data.tickers === 'object' && !Array.isArray(data.tickers)) {
    tickerMap = data.tickers;
  } else if (Array.isArray(data.tickers)) {
    data.tickers.forEach(t => { if (t.symbol) tickerMap[t.symbol] = t; });
  }

  const keys    = Object.keys(tickerMap);
  const display = keys.length ? keys : DEFAULT_TICKERS;
  if (!activeTicker || !display.includes(activeTicker)) activeTicker = display[0];

  renderAccount(data.account);
  updateChart(data.account?.portfolio ?? data.account?.equity);
  renderTickers(display, tickerMap);

  if (data.market_status === 'closed') {
    document.getElementById('bots').innerHTML =
      '<div class="market-closed">Market closed — resumes 9:30 AM ET</div>';
    document.getElementById('votes').innerHTML = '';
    document.getElementById('verdict').textContent = 'Market closed';
    document.getElementById('verdict').style.color = '#555';
  } else if (tickerMap[activeTicker]) {
    renderBots(tickerMap[activeTicker]);
  } else {
    document.getElementById('bots').innerHTML =
      '<div class="market-closed">Waiting for signal data...</div>';
  }

  renderTrades(data.trades || []);
  document.getElementById('lastUpdate').textContent =
    'Updated ' + new Date().toLocaleTimeString();
});

// ── Renderers ─────────────────────────────────────────────────

function renderAccount(acct) {
  if (!acct) return;
  const p = acct.portfolio ?? acct.equity;
  if (p == null) return;
  document.getElementById('port').textContent = '$' + Number(p).toLocaleString();
  document.getElementById('cash').textContent = '$' + Number(acct.cash || 0).toLocaleString();
  const pnl = acct.pnl ?? 0;
  const el  = document.getElementById('pnl');
  el.textContent = (pnl >= 0 ? '+' : '-') + '$' + Math.abs(pnl).toFixed(2);
  el.className   = 'val ' + (pnl > 0 ? 'up' : pnl < 0 ? 'down' : '');
  const regimeMap = {
    trending_up:   { label: 'Trending up',  color: '#1D9E75' },
    trending_down: { label: 'Trending down', color: '#D85A30' },
    ranging:       { label: 'Ranging',       color: '#E9A84C' },
    unknown:       { label: 'Detecting...',  color: '#555'    },
  };
  const r = regimeMap[acct.regime || 'unknown'];
  const regimeEl = document.getElementById('regime');
  regimeEl.textContent = r.label;
  regimeEl.style.color = r.color;
}

function renderTickers(tickers, tickerMap) {
  document.getElementById('tickers').innerHTML = tickers.map(t => {
    const d    = tickerMap[t];
    const price = d?.price ?? '';
    const stop  = d?.stop   ? ` · SL $${d.stop}`   : '';
    const tgt   = d?.target ? ` · TP $${d.target}`  : '';
    return `<div class="tchip${t===activeTicker?' active':''}" onclick="switchTicker('${t}')">
      ${t}${price ? `<span style="font-size:10px;color:#555;margin-left:3px;">$${price}</span>` : ''}
      ${(stop||tgt) ? `<div class="stop-target">${stop}${tgt}</div>` : ''}
    </div>`;
  }).join('');
}

function switchTicker(t) {
  activeTicker = t;
  if (!lastState) return;
  let tickerMap = lastState.tickers || {};
  if (Array.isArray(tickerMap)) {
    const tmp = {}; tickerMap.forEach(x => { tmp[x.symbol] = x; }); tickerMap = tmp;
  }
  const keys = Object.keys(tickerMap);
  renderTickers(keys.length ? keys : DEFAULT_TICKERS, tickerMap);
  if (tickerMap[t]) renderBots(tickerMap[t]);
}

function renderBots(tdata) {
  if (!tdata || !tdata.signals || !tdata.signals.length) {
    document.getElementById('bots').innerHTML =
      '<div class="market-closed">No signal data</div>';
    document.getElementById('votes').innerHTML = '';
    document.getElementById('verdict').textContent = 'No data';
    return;
  }
  const sigs  = tdata.signals;
  const buys  = sigs.filter(s => s.action === 'buy').length;
  const sells = sigs.filter(s => s.action === 'sell').length;

  document.getElementById('votes').innerHTML = sigs.map((s, i) => {
    const cls = s.action==='buy'?'v-buy':s.action==='sell'?'v-sell':'v-hold';
    return `<div class="vote ${cls}" title="${s.name}">${BOT_NAMES[i]||s.name?.slice(0,2)||'?'}</div>`;
  }).join('');

  const v = document.getElementById('verdict');
  if      (buys  >= 3) { v.textContent=`BUY (${buys}/${sigs.length})`;  v.style.color='#1D9E75'; }
  else if (sells >= 3) { v.textContent=`SELL (${sells}/${sigs.length})`; v.style.color='#D85A30'; }
  else                 { v.textContent='Holding';                         v.style.color='#888';    }

  document.getElementById('bots').innerHTML = sigs.map((s, i) => {
    const col = COLORS[i] || '#888';
    const sig = typeof s.signal === 'number' ? s.signal : 50;
    return `<div class="bot">
      <div class="bot-top">
        <div class="bot-icon" style="background:${col}22;color:${col};">${BOT_NAMES[i]||s.name?.slice(0,2)||'?'}</div>
        <div class="bot-name">${s.name||'Bot '+(i+1)}</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.max(0,sig)).toFixed(0)}%;background:${col};"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:6px;">
        <span>Signal</span><span>${sig.toFixed(0)}%</span>
      </div>
      <span class="badge badge-${s.action||'hold'}">${(s.action||'hold').toUpperCase()}</span>
    </div>`;
  }).join('');
}

function mergeTrades(incoming) {
  if (!incoming || !incoming.length) return;
  const key = t => `${t.type}-${t.ticker}-${t.price}-${t.qty}`;
  const existing = new Set(allTrades.map(key));
  let added = 0;
  incoming.forEach(t => {
    if (!existing.has(key(t))) { allTrades.unshift(t); added++; }
  });
  if (added) saveAllTrades();
}

function renderTrades(incoming) {
  mergeTrades(incoming);
  const countEl = document.getElementById('tradeCount');
  if (!allTrades.length) {
    countEl.textContent = '';
    document.getElementById('trades').innerHTML =
      '<div style="color:#555;font-size:12px;padding:8px 0;">No trades yet</div>';
    return;
  }
  countEl.textContent = allTrades.length + ' total trade' + (allTrades.length !== 1 ? 's' : '');
  document.getElementById('trades').innerHTML = allTrades.map(t => {
    const pnlHtml = t.pnl != null
      ? `<span class="trade-pnl ${t.pnl>=0?'up':'down'}">${t.pnl>=0?'+':''}$${Math.abs(t.pnl).toFixed(2)}</span>`
      : '';
    const reasonHtml = t.reason
      ? `<span style="font-size:10px;color:#555;">${t.reason}</span>` : '';
    const timeHtml = t.ts
      ? `<span style="font-size:10px;color:#444;margin-left:auto;">${new Date(t.ts).toLocaleDateString([],{month:'numeric',day:'numeric'})} ${new Date(t.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`
      : '';
    return `<div class="trade">
      <span class="trade-type ${t.type==='BUY'?'up':'down'}">${t.type}</span>
      <span style="font-weight:500;">${t.ticker}</span>
      <span style="color:#555;">${t.qty} @ $${t.price}</span>
      ${reasonHtml}${pnlHtml}${timeHtml}
    </div>`;
  }).join('');
}

initChart();
</script>
</body>
</html>
