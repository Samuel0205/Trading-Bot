<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stock Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1117; color: #e8e8e8; padding: 12px; font-size: 14px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.header h1 { font-size: 18px; font-weight: 600; }
.back { font-size: 12px; color: #4a9eff; text-decoration: none; background: #4a9eff11; padding: 5px 10px; border-radius: 8px; }
.nav { display: flex; gap: 8px; margin-bottom: 14px; }
.nav a { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; text-decoration: none; background: #1a1d27; color: #888; cursor: pointer; }
.nav a.active { background: #4a9eff22; color: #4a9eff; }
.scan-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.scan-time { font-size: 11px; color: #444; }
.predictions-btn { font-size: 11px; color: #E9A84C; text-decoration: none; background: #E9A84C11; padding: 4px 10px; border-radius: 8px; }
.stock-card { background: #1a1d27; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rank { font-size: 22px; font-weight: 700; min-width: 28px; text-align: center; }
.rank.gold   { color: #E9A84C; }
.rank.silver { color: #aaa; }
.rank.bronze { color: #CD7F32; }
.rank.other  { color: #2a2d3a; }
.ticker-block { flex: 1; }
.ticker-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.ticker  { font-size: 17px; font-weight: 700; }
.price   { font-size: 14px; color: #888; }
.change  { font-size: 12px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.up      { background: #1D9E7522; color: #1D9E75; }
.down    { background: #D85A3022; color: #D85A30; }
.score-circle { width: 44px; height: 44px; border-radius: 50%; background: #4a9eff15; border: 1.5px solid #4a9eff33; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.score-num   { font-size: 13px; font-weight: 700; color: #4a9eff; line-height: 1; }
.score-label { font-size: 8px; color: #555; margin-top: 1px; }
.bars { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.bar-row { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #555; }
.bar-row .lbl { min-width: 68px; }
.bar-bg  { flex: 1; height: 4px; background: #2a2d3a; border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .8s ease; }
.bar-val { min-width: 36px; text-align: right; font-size: 10px; color: #666; }
.pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.pill-vol      { background: #4a9eff22; color: #4a9eff; }
.pill-news     { background: #E9A84C22; color: #E9A84C; }
.pill-sent-pos { background: #1D9E7522; color: #1D9E75; }
.pill-sent-neg { background: #D85A3022; color: #D85A30; }
.pill-rs       { background: #C45C8A22; color: #C45C8A; }
.pill-method   { background: #2a2d3a; color: #666; }
.empty   { color: #444; font-size: 13px; text-align: center; padding: 40px 16px; line-height: 1.6; }
.loading { display: flex; align-items: center; gap: 10px; color: #555; font-size: 13px; padding: 32px 0; justify-content: center; }
.spinner { width: 16px; height: 16px; border: 2px solid #2a2d3a; border-top-color: #4a9eff; border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Stock Scanner</h1>
  <a href="/" class="back">← Dashboard</a>
</div>

<div class="nav">
  <a id="tab-today" class="active" onclick="showTab('today')">Today's picks</a>
  <a id="tab-yesterday" onclick="showTab('yesterday')">Yesterday's movers</a>
</div>

<div class="scan-meta">
  <span id="scan-time" class="scan-time">Loading...</span>
  <a href="/predictions" class="predictions-btn">Predictions →</a>
</div>

<div id="today-section">
  <div class="loading"><div class="spinner"></div>Scanning market...</div>
</div>
<div id="yesterday-section" style="display:none;">
  <div class="loading"><div class="spinner"></div>Loading yesterday...</div>
</div>

<script>
let activeTab = 'today';

function showTab(tab) {
  activeTab = tab;
  document.getElementById('today-section').style.display     = tab === 'today'     ? 'block' : 'none';
  document.getElementById('yesterday-section').style.display = tab === 'yesterday' ? 'block' : 'none';
  document.getElementById('tab-today').className     = tab === 'today'     ? 'active' : '';
  document.getElementById('tab-yesterday').className = tab === 'yesterday' ? 'active' : '';
}

function rankClass(i) {
  return ['gold','silver','bronze','other','other'][i] || 'other';
}

function renderList(stocks, containerId) {
  const el = document.getElementById(containerId);
  if (!stocks || !stocks.length) {
    el.innerHTML = '<div class="empty">No data yet.<br>Scanner runs at 9 AM ET on trading days.</div>';
    return;
  }

  el.innerHTML = stocks.map((s, i) => {
    const chgClass   = s.change_pct >= 0 ? 'up' : 'down';
    const chgSign    = s.change_pct >= 0 ? '+' : '';
    const sentPos    = s.sentiment >= 0;
    const sentClass  = sentPos ? 'pill-sent-pos' : 'pill-sent-neg';
    const sentLabel  = (sentPos ? '+' : '') + (typeof s.sentiment === 'number' ? s.sentiment.toFixed(2) : s.sentiment) + ' sentiment';
    const rsSign     = s.rs_5d >= 0 ? '+' : '';
    const methodLabel = s.sent_method === 'finbert' ? 'FinBERT AI' : 'keyword';

    const volPct   = Math.min(100, (s.vol_ratio / 4)  * 100);
    const sentPct  = Math.min(100, Math.abs(typeof s.sentiment === 'number' ? s.sentiment * 15 : 0));
    const rsPct    = Math.min(100, Math.abs(s.rs_5d) * 5);
    const scorePct = Math.min(100, (s.score / 80) * 100);

    return `
    <div class="stock-card">
      <div class="card-top">
        <div class="rank ${rankClass(i)}">${i+1}</div>
        <div class="ticker-block">
          <div class="ticker-row">
            <span class="ticker">${s.ticker}</span>
            <span class="price">$${s.price}</span>
            <span class="change ${chgClass}">${chgSign}${s.change_pct}%</span>
          </div>
          <div style="font-size:10px;color:#555;">5d RS: <span style="color:${s.rs_5d>=0?'#1D9E75':'#D85A30'}">${rsSign}${s.rs_5d}%</span></div>
        </div>
        <div class="score-circle">
          <div class="score-num">${s.score}</div>
          <div class="score-label">score</div>
        </div>
      </div>

      <div class="bars">
        <div class="bar-row">
          <span class="lbl">Volume surge</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${volPct}%;background:#4a9eff;"></div></div>
          <span class="bar-val">${s.vol_ratio}x</span>
        </div>
        <div class="bar-row">
          <span class="lbl">Sentiment</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${sentPct}%;background:${sentPos?'#1D9E75':'#D85A30'};"></div></div>
          <span class="bar-val">${sentPos?'+':''}${typeof s.sentiment==='number'?s.sentiment.toFixed(1):s.sentiment}</span>
        </div>
        <div class="bar-row">
          <span class="lbl">Rel. strength</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${rsPct}%;background:#C45C8A;"></div></div>
          <span class="bar-val">${rsSign}${s.rs_5d}%</span>
        </div>
        <div class="bar-row">
          <span class="lbl">Total score</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${scorePct}%;background:#E9A84C;"></div></div>
          <span class="bar-val">${s.score}</span>
        </div>
      </div>

      <div class="pills">
        <span class="pill pill-vol">${s.vol_ratio}x volume</span>
        <span class="pill pill-news">${s.news_count} articles</span>
        <span class="pill ${sentClass}">${sentLabel}</span>
        <span class="pill pill-rs">${rsSign}${s.rs_5d}% 5-day</span>
        <span class="pill pill-method">${methodLabel}</span>
      </div>
    </div>`;
  }).join('');
}

// Load on page open via REST
fetch('/scan').then(r => r.json()).then(data => {
  if (data && data.scanned_at) {
    document.getElementById('scan-time').textContent = 'Last scan: ' + data.scanned_at;
    renderList(data.today,     'today-section');
    renderList(data.yesterday, 'yesterday-section');
  } else {
    document.getElementById('scan-time').textContent = 'Scan runs at 9 AM ET on trading days';
    document.getElementById('today-section').innerHTML =
      '<div class="empty">No scan data yet.<br>Scanner runs automatically at 9 AM ET on trading days.</div>';
    document.getElementById('yesterday-section').innerHTML =
      '<div class="empty">No scan data yet.</div>';
  }
}).catch(e => {
  console.log('Fetch error:', e);
  document.getElementById('scan-time').textContent = 'Could not load scan data';
});

// Live updates via socket
const socket = io();
socket.on('scan', (data) => {
  document.getElementById('scan-time').textContent = 'Last scan: ' + data.scanned_at;
  renderList(data.today,     'today-section');
  renderList(data.yesterday, 'yesterday-section');
});
</script>
</body>
</html>
